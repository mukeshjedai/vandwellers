name: van_dwellers
description: "Van Dwellers — community app for van life travelers."
publish_to: 'none'

version: 3.0.0+4

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.4.0
  flutter_secure_storage: ^9.2.4
  image_picker: ^1.1.2
  intl: ^0.20.2
  permission_handler: ^12.0.0
  package_info_plus: ^8.3.0
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  flutter_map: ^8.1.1
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/logo.png
  adaptive_icon_background: "#1A237E"
  adaptive_icon_foreground: assets/images/logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
